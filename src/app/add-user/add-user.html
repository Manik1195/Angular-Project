<div class="container">
  <h2>Add Employee</h2>
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="inputs">
      <label>Name</label>
      <input type="text" placeholder="Enter first name" formControlName="name" />
    </div>
    <div class="inputs">
      <label>Salary</label>
      <input type="text" placeholder="Enter first name" formControlName="salary" />
    </div>
    <div class="inputs">
      <label>Role</label>
      <input type="text" placeholder="Enter first name" formControlName="Role" />
    </div>
    <div class="inputs">
      <button>Submit</button>
      <button class="cancel" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
