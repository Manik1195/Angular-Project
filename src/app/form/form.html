<div class="main">
  <div class="container">
    <h3>User Details</h3>
    <div class="inputs">
      <label>UserId</label>
      <input type="text" [(ngModel)]="user.userId" />
    </div>
    <div class="inputs">
      <label>Id</label>
      <input type="text" [(ngModel)]="user.id" />
    </div>
    <div class="inputs">
      <label>Title</label>
      <input type="text" [(ngModel)]="user.title" />
    </div>
    <div class="inputs">
      <label>Completed</label>
      <input type="text" [(ngModel)]="user.completed" />
    </div>
    <div class="inputs">
      <button (click)="click()">Click</button>
    </div>
  </div>
</div>
